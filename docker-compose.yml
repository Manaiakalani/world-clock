services:
  world-clock:
    build: .
    container_name: world-clock
    restart: unless-stopped
    ports:
      - "${PORT:-3009}:3000"
    environment:
      - NODE_ENV=production
    networks:
      - default
      - cloudflared
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  cloudflared:
    external: true
    name: docker_default
