services:
  world-clock:
    build: .
    container_name: world-clock
    restart: unless-stopped
    ports:
      - "${PORT:-3009}:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
